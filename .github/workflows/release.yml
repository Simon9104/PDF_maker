name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-macos-intel:
    name: Build macOS (Intel x86_64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install reportlab pyinstaller

      - name: Build .app bundle
        run: pyinstaller app.spec

      - name: Create DMG
        run: |
          hdiutil create -volname "CustomerTableGenerator" \
            -srcfolder dist/CustomerTableGenerator.app \
            -ov -format UDZO \
            CustomerTableGenerator-macOS-Intel.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-intel
          path: CustomerTableGenerator-macOS-Intel.dmg

  build-macos-arm:
    name: Build macOS (Apple Silicon arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install reportlab pyinstaller

      - name: Build .app bundle
        run: pyinstaller app.spec

      - name: Create DMG
        run: |
          hdiutil create -volname "CustomerTableGenerator" \
            -srcfolder dist/CustomerTableGenerator.app \
            -ov -format UDZO \
            CustomerTableGenerator-macOS-AppleSilicon.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-arm
          path: CustomerTableGenerator-macOS-AppleSilicon.dmg

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install reportlab pyinstaller

      - name: Build .exe
        run: pyinstaller app.spec

      - name: Zip Windows build
        run: |
          Compress-Archive -Path dist\CustomerTableGenerator.exe -DestinationPath CustomerTableGenerator-Windows.zip
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: CustomerTableGenerator-Windows.zip

  release:
    name: Create GitHub Release
    needs: [build-macos-intel, build-macos-arm, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create git tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Delete tag locally if it already exists from a previous failed run
          git tag -d ${{ steps.tag.outputs.name }} 2>/dev/null || true
          git push origin :refs/tags/${{ steps.tag.outputs.name }} 2>/dev/null || true
          git tag ${{ steps.tag.outputs.name }}
          git push origin ${{ steps.tag.outputs.name }}

      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg-intel

      - name: Download macOS Apple Silicon artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg-arm

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "Customer Table Generator ${{ steps.tag.outputs.name }}"
          body: |
            ## Customer Table Generator ${{ steps.tag.outputs.name }}

            A desktop app to create professional customer tables and export them as PDF.

            ### Features
            - Set a custom headline, subtitle, and footer
            - Add/edit/remove columns and rows
            - Preview table before export
            - Export a professionally formatted PDF

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS — Intel (2019 and older) | `CustomerTableGenerator-macOS-Intel.dmg` |
            | macOS — Apple Silicon M1/M2/M3/M4 | `CustomerTableGenerator-macOS-AppleSilicon.dmg` |
            | Windows | `CustomerTableGenerator-Windows.zip` (extract and run the `.exe`) |

            > **Not sure which Mac you have?**  
            > Apple menu → About This Mac → look for "Intel" or "Apple M1/M2/M3"

            ### macOS install
            1. Open the correct `.dmg` for your chip
            2. Drag **CustomerTableGenerator** to Applications
            3. Right-click → Open on first launch (Gatekeeper warning)

            ### Windows install
            1. Extract the `.zip`
            2. Double-click `CustomerTableGenerator.exe`
          files: |
            CustomerTableGenerator-macOS-Intel.dmg
            CustomerTableGenerator-macOS-AppleSilicon.dmg
            CustomerTableGenerator-Windows.zip
          draft: false
          prerelease: false
